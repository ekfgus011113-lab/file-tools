name: Scheduled site monitoring

on:
  schedule:
    # GitHub cron은 UTC 기준입니다: 매일 09:00 KST
    - cron: "0 0 * * *"
    # 매주 월요일 10:00 KST
    - cron: "0 1 * * 1"
    # 매월 첫째 수요일 10:00 KST
    - cron: "0 1 1-7 * 3"
  workflow_dispatch:
    inputs:
      scope:
        description: 실행할 점검 범위
        type: choice
        required: true
        default: all
        options:
          - all
          - health
          - weekly
          - monthly

permissions:
  contents: read
  issues: write

concurrency:
  group: scheduled-site-monitoring
  cancel-in-progress: false

jobs:
  health:
    name: 배포 사이트 상태 점검
    if: github.event_name == 'schedule' || inputs.scope == 'all' || inputs.scope == 'health'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 주요 페이지, robots.txt, sitemap.xml 점검
        run: node scripts/monitor-site.mjs
      - name: 실패 이슈 생성 또는 갱신
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[자동 점검] 파일핏 사이트 상태 오류';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);
            const body = `예약 상태 점검이 실패했습니다.\n\n- 실행: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n- 시각(UTC): ${new Date().toISOString()}\n\n코드나 배포는 자동 변경되지 않았습니다.`;
            if (existing) {
              await github.rest.issues.addAssignees({ ...context.repo, issue_number: existing.number, assignees: ['ekfgus011113-lab'] });
              await github.rest.issues.createComment({ ...context.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ ...context.repo, title, body, assignees: ['ekfgus011113-lab'] });
            }

  weekly-quality:
    name: 주간 빌드 및 브라우저 검사
    if: github.event.schedule == '0 1 * * 1' || inputs.scope == 'all' || inputs.scope == 'weekly'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: 의존성 설치
        run: pnpm install --frozen-lockfile
      - name: 코드 정적 검사
        id: lint
        continue-on-error: true
        run: pnpm lint
      - name: 빌드 및 렌더링 검사
        run: pnpm test
      - name: Chromium 설치
        run: pnpm exec playwright install --with-deps chromium
      - name: PC 및 모바일 사용자 흐름 검사
        run: pnpm test:e2e
      - name: 정적 검사 실패 반영
        if: steps.lint.outcome == 'failure'
        run: |
          echo "기존 코드를 포함한 정적 검사에서 오류가 발견되었습니다."
          exit 1
      - name: 브라우저 검사 보고서 보관
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14
      - name: 실패 이슈 생성 또는 갱신
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[자동 점검] 파일핏 주간 품질 검사 오류';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);
            const body = `주간 빌드 또는 브라우저 검사가 실패했습니다.\n\n- 실행: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n- 시각(UTC): ${new Date().toISOString()}\n\n코드나 배포는 자동 변경되지 않았습니다.`;
            if (existing) {
              await github.rest.issues.addAssignees({ ...context.repo, issue_number: existing.number, assignees: ['ekfgus011113-lab'] });
              await github.rest.issues.createComment({ ...context.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ ...context.repo, title, body, assignees: ['ekfgus011113-lab'] });
            }

  monthly-maintenance:
    name: 월간 기술 유지보수 점검
    if: github.event.schedule == '0 1 1-7 * 3' || inputs.scope == 'all' || inputs.scope == 'monthly'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: 의존성 설치
        run: pnpm install --frozen-lockfile
      - name: 오래된 의존성 목록 저장
        shell: bash
        run: |
          mkdir -p maintenance-report
          pnpm outdated --format json > maintenance-report/outdated.json || true
      - name: 높은 위험 이상의 보안 취약점 점검
        shell: bash
        run: pnpm audit --audit-level=high --json > maintenance-report/audit.json
      - name: 유지보수 점검 보고서 보관
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monthly-maintenance-report
          path: maintenance-report/
          if-no-files-found: ignore
          retention-days: 30
      - name: 보안 점검 실패 이슈 생성 또는 갱신
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[자동 점검] 파일핏 월간 기술 유지보수 필요';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);
            const body = `월간 의존성 또는 보안 점검에서 확인이 필요한 문제가 발견되었습니다.\n\n- 실행: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n- 시각(UTC): ${new Date().toISOString()}\n\n자동 업데이트나 배포는 수행하지 않았습니다.`;
            if (existing) {
              await github.rest.issues.addAssignees({ ...context.repo, issue_number: existing.number, assignees: ['ekfgus011113-lab'] });
              await github.rest.issues.createComment({ ...context.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ ...context.repo, title, body, assignees: ['ekfgus011113-lab'] });
            }
